<!-- Bootstrap Navbar -->
<nav class="navbar navbar-expand-lg navbar-light fixed-top" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(109, 40, 217, 0.1); z-index: 1050;">
    <div class="container-fluid">
      <!-- Logo -->
      <a class="navbar-brand fw-bold" href="{% url 'home' %}" style="background: linear-gradient(135deg, #6D28D9 0%, #1E40AF 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 1.5rem;">
        KalaPathshala
      </a>
  
      <!-- Toggler for mobile -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="true" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
  
      <!-- Navbar links -->

  
        <!-- Right side buttons -->
        <ul class="navbar-nav ms-auto align-items-center">
          <!-- Theme Toggle Button -->
          <li class="nav-item me-2">
            <button class="btn btn-outline-secondary rounded-circle" id="theme-toggle" aria-label="Toggle dark mode" style="width: 40px; height: 40px; padding-left: 10px; border: 1px solid rgba(109,40,217,0.2);">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 20px; height: 20px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
          </li>
  
          <!-- Login/Logout Button -->
          <li class="nav-item">
            {% if not user.is_authenticated %}
            <a href="{% url 'login' %}" class="btn btn-primary rounded-pill fw-semibold" style="background: linear-gradient(135deg, #6D28D9 0%, #1E40AF 100%); border: none; color: white; padding: 0.6rem 1.4rem; font-size: 0.9rem; text-decoration: none;">
              Sign In
            </a>
            {% else %}
            <div class="d-flex gap-2">
              {% if user.is_superuser %}
              <a href="/admin" class="btn btn-primary rounded-pill fw-semibold" style="background: linear-gradient(135deg, #6D28D9 0%, #1E40AF 100%); border: none; color: white; padding: 0.6rem 1.4rem; font-size: 0.9rem; text-decoration: none;">
                Admin
              </a>
              {% else %}
              <a href="{% if user.teacher %}{% url 'teacher_dashboard' %}{% else %}{% url 'student_dashboard' %} {% endif %}" class="btn btn-primary rounded-pill fw-semibold" style="background: linear-gradient(135deg, #6D28D9 0%, #1E40AF 100%); border: none; color: white; padding: 0.6rem 1.4rem; font-size: 0.9rem; text-decoration: none;">
                Dashboard
              </a>
              {% endif %}
              
              <a href="{% url 'logout' %}" class="btn btn-outline-danger rounded-pill fw-semibold" style="border: 1px solid #dc3545; color: #dc3545; padding: 0.6rem 1.4rem; font-size: 0.9rem; text-decoration: none;">
                Logout
              </a>
            </div>
            {% endif %}
          </li>
        </ul>
      </div>
    </div>
  </nav>
