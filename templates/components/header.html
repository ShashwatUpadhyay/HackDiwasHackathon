
<!-- Custom Header for Homepage -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-200">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
          <!-- Logo -->
          <div class="flex-shrink-0">
              <a href="{% url 'home' %}" class="flex items-center space-x-2">
                  <div class="w-8 h-8 bg-gradient-to-r from-purple-600 to-purple-800 rounded-lg flex items-center justify-center">
                      <span class="text-white font-bold text-lg">K</span>
                  </div>
                  <span class="text-xl font-bold text-gray-900">KalaPathshala</span>
              </a>
          </div>

          <!-- Desktop Navigation -->
          <div class="hidden md:block">
              <div class="ml-10 flex items-baseline space-x-8">
                  <a href="{% url 'home' %}" class="text-gray-900 hover:text-purple-600 px-3 py-2 text-sm font-medium transition-colors">Home</a>
                  <a href="{% url 'explore' %}" class="text-gray-700 hover:text-purple-600 px-3 py-2 text-sm font-medium transition-colors">Courses</a>
                  <a href="{% url 'exploreTeacher' %}" class="text-gray-700 hover:text-purple-600 px-3 py-2 text-sm font-medium transition-colors">Teachers</a>
                  <a href="#about" class="text-gray-700 hover:text-purple-600 px-3 py-2 text-sm font-medium transition-colors">About</a>
                  <a href="#contact" class="text-gray-700 hover:text-purple-600 px-3 py-2 text-sm font-medium transition-colors">Contact</a>
                  {% if user.is_authenticated %}
                  {% if user.student %}
                  <a href="{% url "student_dashboard" %}" class="text-gray-700 hover:text-purple-600 px-3 py-2 text-sm font-medium transition-colors">Dashboard</a>
                  {% endif %}
                  {% if user.teacher %}
                  <a href="{% url "teacher_dashboard" %}" class="text-gray-700 hover:text-purple-600 px-3 py-2 text-sm font-medium transition-colors">Teacher Dashboard</a>
                  {% endif %}
                  {% endif %}
                </div>
          </div>

          <!-- Right side buttons -->
          <div class="flex items-center space-x-4">
              <!-- Theme Toggle -->
              <button id="theme-toggle" class="p-2 rounded-lg text-gray-700 hover:text-purple-600 hover:bg-purple-50 transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                  </svg>
              </button>

              <!-- Sign In Button -->
              {% if user.is_authenticated %}
                  <a href="{% url 'logout' %}" class="bg-gradient-to-r from-purple-600 to-purple-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:from-purple-700 hover:to-purple-800 transition-all duration-200 shadow-lg hover:shadow-xl">
                      Sign Out
                  </a>
              {% else %}
                  <a href="{% url 'login' %}" class="bg-gradient-to-r from-purple-600 to-purple-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:from-purple-700 hover:to-purple-800 transition-all duration-200 shadow-lg hover:shadow-xl">
                      Sign In
                  </a>
              {% endif %}

              <!-- Mobile menu button -->
              <button id="mobile-menu-button" class="md:hidden p-2 rounded-lg text-gray-700 hover:text-purple-600 hover:bg-purple-50 transition-colors">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                  </svg>
              </button>
          </div>
      </div>

      <!-- Mobile Navigation -->
      <div id="mobile-menu" class="md:hidden hidden">
          <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-white border-t border-gray-200">
              <a href="{% url 'home' %}" class="text-gray-900 hover:text-purple-600 block px-3 py-2 text-base font-medium">Home</a>
              <a href="{% url 'explore' %}" class="text-gray-700 hover:text-purple-600 block px-3 py-2 text-base font-medium">Courses</a>
              <a href="{% url 'exploreTeacher' %}" class="text-gray-700 hover:text-purple-600 block px-3 py-2 text-base font-medium">Teachers</a>
              <a href="#about" class="text-gray-700 hover:text-purple-600 block px-3 py-2 text-base font-medium">About</a>
              <a href="#contact" class="text-gray-700 hover:text-purple-600 block px-3 py-2 text-base font-medium">Contact</a>
          </div>
      </div>
  </nav>
</header>
